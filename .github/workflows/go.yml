name: Release (manual, cgo, linux+mac)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Тег релиза (например v1.2.3)'
        required: true
      prerelease:
        description: 'Отметить как prerelease'
        type: boolean
        default: false

jobs:
  build-linux-amd64:
    name: Build Linux amd64 (CGO static musl)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build linux/amd64 static
        run: |
          set -euxo pipefail
          mkdir -p dist
          BIN="tlss-linux-amd64"
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            golang:1.25-alpine \
            sh -c "apk add --no-cache gcc musl-dev && \
              CGO_ENABLED=1 go build -trimpath \
                -ldflags='-linkmode external -extldflags \"-static\" -s -w' \
                -o dist/${BIN} ."
          ls -l "dist/${BIN}"
          (cd dist && tar -czf "${BIN}.tar.gz" "${BIN}" && rm -f "${BIN}")

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bins-linux-amd64
          path: dist/*
          retention-days: 7

  build-linux-arm64:
    name: Build Linux arm64 (CGO static musl)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Build linux/arm64 static
        run: |
          set -euxo pipefail
          mkdir -p dist
          BIN="tlss-linux-arm64"
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            golang:1.25-alpine \
            sh -c "apk add --no-cache gcc musl-dev && \
              CGO_ENABLED=1 go build -trimpath \
                -ldflags='-linkmode external -extldflags \"-static\" -s -w' \
                -o dist/${BIN} ."
          ls -l "dist/${BIN}"
          (cd dist && tar -czf "${BIN}.tar.gz" "${BIN}" && rm -f "${BIN}")

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bins-linux-arm64
          path: dist/*
          retention-days: 7

  build-macos:
    name: Build macOS arm64 (native CGO)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'

      # Если требуются внешние C-библиотеки (пример OpenSSL), раскомментируйте:
      # - name: Install macOS deps
      #   run: |
      #     brew update
      #     brew install openssl@3 pkg-config
      #     echo "PKG_CONFIG_PATH=$(brew --prefix)/opt/openssl@3/lib/pkgconfig" >> $GITHUB_ENV

      - name: Build darwin/arm64 with CGO (native)
        env:
          CGO_ENABLED: "1"
        run: |
          set -euxo pipefail
          mkdir -p dist
          BIN="tlss-darwin-arm64"
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=1 \
            go build -trimpath -ldflags="-s -w" -o "dist/${BIN}" .
          (cd dist && tar -czf "${BIN}.tar.gz" "${BIN}" && rm -f "${BIN}")
          ls -l dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bins-macos
          path: dist/*
          retention-days: 7

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-linux-amd64, build-linux-arm64, build-macos]
    permissions:
      contents: write

    steps:
      # 1) Гарантируем наличие тега БЕЗ checkout (через GitHub API)
      - name: Ensure tag exists (via GitHub API)
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ inputs.tag }}';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // пробуем получить ref
            try {
              await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
              core.info(`Tag ${tag} already exists`);
            } catch (e) {
              // создаём тег на текущий SHA workflow (ветка, откуда запустили)
              const sha = process.env.GITHUB_SHA;
              core.info(`Creating tag ${tag} at ${sha}`);
              await github.rest.git.createRef({
                owner, repo,
                ref: `refs/tags/${tag}`,
                sha
              });
            }

      # 2) Скачиваем ВСЕ артефакты из предыдущих джобов в одну папку (на раннере)
      - name: Download artifacts (merge)
        uses: actions/download-artifact@v4
        with:
          pattern: bins-*          # ваши имена артефактов
          path: upload             # локальная временная папка на раннере
          merge-multiple: true

      - name: List files
        run: ls -l upload

      # 3) Публикуем файлы как assets релиза
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          draft: false
          prerelease: ${{ inputs.prerelease }}
          files: upload/*          # всё из временной папки
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
